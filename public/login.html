<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logg inn – MOVED Norsk A1-portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B3A5C;
    --navy2: #2A5480;
    --gold:  #C9960C;
    --gold2: #E8C050;
    --white: #FFFFFF;
    --cream: #F7F4EE;
    --text:  #1A1A2E;
    --muted: #6B7B8D;
    --error: #D94040;
    --border: #D8DDE3;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Bakgrunnsdekorasjon */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: rgba(201,150,12,0.08);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }

  .login-box {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 44px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.35);
    position: relative;
    z-index: 1;
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 8px;
  }
  .logo-wrap img {
    height: 52px;
    width: auto;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: var(--gold);
    border-radius: 2px;
    margin: 18px auto 28px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.55rem;
    font-weight: 800;
    color: var(--navy);
    text-align: center;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px 14px 46px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input[type="password"]:focus {
    border-color: var(--navy);
    background: white;
  }

  .error-msg {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #FDEAEA;
    border: 1.5px solid #F5B0B0;
    color: var(--error);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 500;
    margin-bottom: 20px;
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  button[type="submit"] {
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  button[type="submit"]:hover {
    background: var(--navy2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(27,58,92,0.35);
  }
  button[type="submit"]:active { transform: translateY(0); }

  .footer-note {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 28px;
    line-height: 1.6;
  }

  /* Fjord-stripe nederst */
  .fjord-stripe {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    z-index: 2;
  }
  .fjord-stripe img.fjord {
    position: absolute;
    bottom: 24px; left: 0; right: 0;
    width: 100%;
    height: 50px;
    object-fit: cover;
    opacity: 0.18;
  }
  .fjord-stripe img.kommune {
    height: 28px;
    width: auto;
    opacity: 0.6;
    position: relative;
    z-index: 3;
    filter: brightness(5);
  }

  @media (max-width: 480px) {
    .login-box { padding: 36px 24px 32px; }
  }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo-wrap">
    <img src="/assets/logo_moved.png" alt="MOVED – Molde Voksenopplæring">
  </div>

  <div class="divider"></div>

  <h1>Norsk A1-portal</h1>
  <p class="subtitle">Logg inn for å lage undervisningsmateriell</p>

  <!-- Feilmelding -->
  <div id="feil-melding" class="error-msg" style="display:none">
    ⚠️ Feil passord. Prøv igjen.
  </div>

  <form method="POST" action="/login" id="login-form">
    <label for="passord">Passord</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input
        type="password"
        id="passord"
        name="passord"
        placeholder="Skriv inn passord..."
        autocomplete="current-password"
        required
        autofocus
      >
    </div>

    <button type="submit">Logg inn →</button>
  </form>

  <p class="footer-note">
    Molde voksenopplæringssenter · MBO-kurs<br>
    Kun for lærere og ansatte
  </p>
</div>

<div class="fjord-stripe">
  <img class="fjord" src="/assets/fjord_banner.png" alt="">
  <img class="kommune" src="/assets/logo_kommune.png" alt="Molde Kommune">
</div>

<script>
  // Vis feil hvis ?feil=1 i URL
  if (new URLSearchParams(window.location.search).get("feil") === "1") {
    document.getElementById("feil-melding").style.display = "flex";
    document.getElementById("passord").focus();
    document.getElementById("passord").select();
  }
</script>
</body>
</html>
